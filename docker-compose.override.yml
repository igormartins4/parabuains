# docker-compose.override.yml
# Aplicado automaticamente sobre docker-compose.yml em desenvolvimento local.
# Isola node_modules do container do node_modules do host (evita conflitos no Windows).
services:
  api:
    volumes:
      # Isola node_modules do container — evita conflito com host no Windows/macOS
      - api_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - db_node_modules:/app/packages/db/node_modules

  web:
    volumes:
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - web_next_cache:/app/apps/web/.next

volumes:
  api_node_modules:
  api_app_node_modules:
  db_node_modules:
  web_node_modules:
  web_app_node_modules:
  web_next_cache:
